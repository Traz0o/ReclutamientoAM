<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión | OSearch</title>
  <link rel="stylesheet" href="/css/login.css">
</head>
<body>

<div id="loginForm">
  <div class="card">
    <h1>Overdrive Search</h1>
    <p class="sub">Motor, Motivación, Movimiento</p>

    <label for="email">Correo electrónico</label>
    <input type="email" id="email" placeholder="Ej. admin@dominio.com" />

    <label for="pwd">Contraseña</label>
    <div class="pw-wrap">
      <input type="password" id="pwd" placeholder="••••••••" />
    </div>

    <div class="space"></div>

    <button class="btn" id="loginBtn" type="button">Iniciar sesión</button>
    <p id="msg" class="msg" aria-live="polite"></p>
  </div>
</div>
<script src="js/login.js"></script>
</body>
</html>
